name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @agro/api prisma:generate

      - name: Lint
        run: pnpm -r lint

      - name: Unit tests
        run: pnpm --filter @agro/api test

      - name: E2E tests
        run: pnpm --filter @agro/api test:e2e

      - name: Build (api + web)
        run: pnpm -r build
