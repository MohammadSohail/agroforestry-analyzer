# Render Blueprint — one-click deploy of a managed Postgres database and a single
# Docker web service that builds BOTH the React dashboard and the NestJS API. The
# API serves the dashboard at "/", Swagger at "/docs", and the REST API at "/api/v1".
#   1. Push this repo to GitHub.
#   2. Render Dashboard -> New -> Blueprint -> select the repo.
#   3. After the first deploy, set PUBLIC_BASE_URL to the service URL and redeploy.

databases:
  - name: agro-postgres
    plan: free
    databaseName: agroforestry
    user: agro

services:
  # ---- API + bundled dashboard (single service) ----
  - type: web
    name: agroforestry-analyzer
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agro-postgres
          property: connectionString
      - key: PORT
        value: 3000
      - key: WEATHER_AI_MODE
        value: mock # set to "live" and provide WEATHER_AI_API_KEY to use the real API
      - key: WEATHER_AI_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false # set to this service's own URL, e.g. https://agroforestry-analyzer.onrender.com
      - key: CORS_ORIGINS
        sync: false # optional; the UI is same-origin. Set if you also call the API from elsewhere.
